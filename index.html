        tailwind.config = {
            darkMode: 'class',

                extend: {
                    colors: {
                        brandDark: '#0B0F19',
                        brandCard: '#151D30',
                        brandBorder: '#222F4C',

                        sans: ['Inter', 'sans-serif'],

                }
            }
        }

    <script src="https://unpkg.com/lucide@latest"></script>

        body {

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #F3F4F6;
        }
        
        .tilt-card {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.3, 1), box-shadow 0.5s ease, border-color 0.3s ease;
            will-change: transform;
        }

        .keys-scrollbar::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        .keys-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .keys-scrollbar::-webkit-scrollbar-thumb {
            background: #1F2937;
            border-radius: 9999px;
        }
        .keys-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #E0A96D;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none !important;
        }
        .no-scrollbar {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

            </div>

    </header>

                    if (Array.isArray(parsed) && parsed.length > 0) {
                        brands = parsed;
                        return;
                    }
                }
            } catch(e) {
                console.error("Storage error:", e);
            }
            
            brands = JSON.parse(JSON.stringify(defaultBrandsData));
            saveDatabase();
        }

        function saveDatabase() {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(brands));

                console.error("Save error:", e);
            }

        function copyCompiledKeysToClipboard(brandId) {
            const brand = brands.find(b => b.id === brandId);
            if (!brand) return;
            
            const compiledKeysString = brand.geos.map(g => {
                const prefix = g.code.toLowerCase() === 'gb' ? 'global' : g.code.toLowerCase();
                const kArr = Array.isArray(g.keys) ? g.keys : [];
                return `${prefix}: ${kArr.join(', ')}`;
            }).join(' | ');

            const tempEl = document.createElement('textarea');
            tempEl.value = compiledKeysString;
            tempEl.style.position = 'fixed';
            tempEl.style.opacity = '0';
            document.body.appendChild(tempEl);
            tempEl.select();
            
            try {
                const success = document.execCommand('copy');
                if (success) {
                    showToast("Ключи скопированы!");
                } else {
                    showToast("Ошибка копирования");
                }
            } catch (err) {
                console.error("Copy err:", err);
            }
            
            document.body.removeChild(tempEl);
        }

        function setupTiltEffect() {
            const cards = document.querySelectorAll('.tilt-card');
            cards.forEach(card => {
                card.removeEventListener('mousemove', handleMouseMove);
                card.removeEventListener('mouseleave', handleMouseLeave);
                
                card.addEventListener('mousemove', handleMouseMove);
                card.addEventListener('mouseleave', handleMouseLeave);
            });
        }

        function handleMouseMove(e) {
            const card = e.currentTarget;
            const cardRect = card.getBoundingClientRect();
            
            const cardWidth = cardRect.width;
            const cardHeight = cardRect.height;
            
            const x = e.clientX - cardRect.left;
            const y = e.clientY - cardRect.top;
            
            const xRotation = -6 * ((y - cardHeight / 2) / (cardHeight / 2));
            const yRotation = 6 * ((x - cardWidth / 2) / (cardWidth / 2));
            
            card.style.transform = `perspective(1000px) scale3d(1.015, 1.015, 1.015) rotateX(${xRotation}deg) rotateY(${yRotation}deg)`;
            card.style.boxShadow = '0 20px 40px rgba(0, 0, 0, 0.6)';
        }

        function handleMouseLeave(e) {
            const card = e.currentTarget;
            card.style.transform = 'perspective(1000px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg)';
            card.style.boxShadow = 'none';
        }

                PREDEFINED_COUNTRIES
                    .filter(c => !brand.geos.some(g => g.code === c.code))
                    .map(c => `<option value="${c.code}">${c.name} (${c.code})</option>`).join('');

            const addBtn = document.querySelector('button[onclick="addGeoToActiveBrand()"]');
            const limitWarning = document.getElementById('geo-limit-warning');

            if (brand.geos.length >= 7) {
                selectGeo.disabled = true;
                selectGeo.className = "flex-1 bg-brandDark/40 border border-brandBorder/30 rounded-xl text-xs p-3 text-gray-500 cursor-not-allowed";
                if (addBtn) {
                    addBtn.disabled = true;
                    addBtn.className = "px-5 py-3 bg-yellow-500/20 text-brandDark/40 font-bold text-xs rounded-xl cursor-not-allowed transition-all";
                }
                limitWarning.classList.remove('hidden');
            } else {
                selectGeo.disabled = false;
                selectGeo.className = "flex-1 bg-brandDark border border-brandBorder rounded-xl text-xs p-3 text-white focus:outline-none focus:ring-1 focus:ring-yellow-500";
                if (addBtn) {
                    addBtn.disabled = false;
                    addBtn.className = "px-5 py-3 bg-yellow-500 hover:bg-yellow-600 text-brandDark font-bold text-xs rounded-xl transition-all";
                }
                limitWarning.classList.add('hidden');
            }

            const modal = document.getElementById('geo-edit-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);

            if (window.lucide) lucide.createIcons();
        }

        function closeGeoEditModal() {
            const modal = document.getElementById('geo-edit-modal');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }

        function saveGeoEditChanges() {
            const brand = brands.find(b => b.id === activeBrandId);
            if (!brand) return;
            const geo = brand.geos[activeGeoIndex];
            if (!geo) return;

            const inputVal = document.getElementById('active-edit-keys-input').value;
            geo.keys = inputVal.split(',').map(k => k.trim()).filter(Boolean);

            saveDatabase();
            closeGeoEditModal();
            renderBrands(document.getElementById('search-input').value);
            showToast("GEO настройки сохранены!");
        }

        function addGeoToActiveBrand() {
            const brand = brands.find(b => b.id === activeBrandId);
            if (!brand) return;

            if (brand.geos.length >= 7) {
                showToast("Достигнут лимит: максимум 7 GEO!");
                return;
            }

            const selectGeo = document.getElementById('edit-new-geo-select');
            const code = selectGeo.value;
            if (!code) return;

            const config = PREDEFINED_COUNTRIES.find(c => c.code === code);
            if (!config) return;

            brand.geos.push({
                code: config.code,
                name: config.name,
                flag: config.flag,
                keys: []
            });

            saveDatabase();
            triggerGeoEditModal({ preventDefault: () => {} }, activeBrandId, activeGeoIndex);
            renderBrands(document.getElementById('search-input').value);
            showToast(`GEO ${config.code} успешно добавлен!`);
        }

        function deleteGeoFromActiveBrand(e, geoIdx) {
            e.stopPropagation();
            const brand = brands.find(b => b.id === activeBrandId);
            if (!brand) return;

            brand.geos.splice(geoIdx, 1);

            saveDatabase();
            activeGeoIndex = 0;
            triggerGeoEditModal({ preventDefault: () => {} }, activeBrandId, 0);
            renderBrands(document.getElementById('search-input').value);
            showToast("GEO удалён из карточки.");
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            
            if (!toast || !toastText) return;
            toastText.textContent = text;
            
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 2500);
        }
    </script>
</body>
</html>
