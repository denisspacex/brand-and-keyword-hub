    <script>

            darkMode: 'class',

                extend: {
                    colors: {
                        brandDark: '#0B0F19',
                        brandCard: '#151D30',
                        brandBorder: '#222F4C',
                        brandAccent: '#E0A96D',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {

            background-color: #0B0F19;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #F3F4F6;
        }
        
        .tilt-card {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.3, 1), box-shadow 0.5s ease, border-color 0.3s ease;
            will-change: transform;
        }

        .keys-scrollbar::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        .keys-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .keys-scrollbar::-webkit-scrollbar-thumb {
            background: #1F2937;
            border-radius: 9999px;
        }
        .keys-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #E0A96D;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none !important;
        }
        .no-scrollbar {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

<body class="min-h-screen pb-12 antialiased">

    <!-- Header -->
    <header class="border-b border-brandBorder bg-brandCard/50 backdrop-blur-md sticky top-0 z-40">

            <div class="flex items-center">
                <h1 class="text-lg font-extrabold tracking-tight text-white select-none">
                    brand & keyword hub
                </h1>
            </div>

            <div class="flex flex-wrap items-center justify-center bg-brandDark/40 p-1.5 rounded-2xl border border-brandBorder/60 gap-1">
                <button onclick="setActiveTab('all')" id="tab-all" class="px-4 py-2 text-xs font-bold rounded-xl transition-all text-white bg-yellow-500/10 border border-yellow-500/20">all brands</button>
                <button onclick="setActiveTab('core')" id="tab-core" class="px-4 py-2 text-xs font-bold rounded-xl transition-all text-gray-400 hover:text-white hover:bg-brandDark/40">core brands</button>
                <button onclick="setActiveTab('test')" id="tab-test" class="px-4 py-2 text-xs font-bold rounded-xl transition-all text-gray-400 hover:text-white hover:bg-brandDark/40">test brands</button>
                <button onclick="setActiveTab('trash')" id="tab-trash" class="px-4 py-2 text-xs font-bold rounded-xl transition-all text-gray-400 hover:text-white hover:bg-brandDark/40">trash brands</button>
            </div>
            
            <div class="relative w-72 sm:w-80">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="h-4 w-4 text-gray-400"></i>
                </div>
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Поиск бренда, GEO или ключей..." 
                    class="block w-full pl-9 pr-4 py-2 border border-brandBorder rounded-xl bg-brandDark text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition-all"
                >
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">

                    all brands

                <!-- Cards dynamically loaded here -->
            </div>
        </div>

    <div id="geo-edit-modal" class="fixed inset-0 bg-brandDark/90 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">

                </div>
                <button onclick="closeGeoEditModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="p-6 space-y-6 max-h-[80vh] overflow-y-auto">
                <div class="bg-brandDark/40 p-4 rounded-xl border border-brandBorder space-y-3">
                    <div class="flex items-center gap-2">
                        <img id="active-edit-flag" src="" alt="" class="w-6 h-4.5 object-cover rounded-sm">
                        <span id="active-edit-geoname" class="text-sm font-extrabold text-white"></span>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Ключевые слова (через запятую):</label>
                        <textarea id="active-edit-keys-input" ondblclick="this.select()" rows="3" class="w-full px-4 py-2.5 bg-brandDark border border-brandBorder rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-yellow-500 text-sm" placeholder="Дважды кликните здесь для выделения всех ключей"></textarea>
                        <p class="text-[9px] text-gray-500 mt-1">💡 Дважды кликните в поле ввода выше, чтобы мгновенно выделить все ключевые слова.</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Все GEO этого бренда:</label>
                    <div id="edit-geos-list" class="space-y-2 max-h-[140px] overflow-y-auto pr-1"></div>
                </div>

                <div id="add-geo-section" class="pt-4 border-t border-brandBorder space-y-2">
                    <label class="block text-[10px] font-bold text-yellow-500 uppercase tracking-wider">Добавить новую страну к бренду:</label>

                        <select id="edit-new-geo-select" class="flex-1 bg-brandDark border border-brandBorder rounded-xl text-xs p-3 text-white focus:outline-none focus:ring-1 focus:ring-yellow-500"></select>

                            Добавить GEO

            </div>

            }

            if (CUSTOM_BRAND_GEOS[b.id]) {
                return {

                    category: category,
                    geos: CUSTOM_BRAND_GEOS[b.id]

            }

            return {
                id: b.id,
                name: formattedName,
                logo: b.logo,

        // 3. ОСНОВНАЯ ЛОГИКА И СТАРТ
        const DB_KEY = 'brand_hub_db_v4.0_fixed';

        function initDatabase() {
            try {
                let saved = localStorage.getItem(DB_KEY);
                if (saved) {
                    let parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        brands = parsed;
                        return;
                    }
                }
            } catch(e) {
                console.error("Storage error:", e);
            }
            
            brands = JSON.parse(JSON.stringify(defaultBrandsData));
            saveDatabase();
        }

        function saveDatabase() {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(brands));
            } catch(e) {
                console.error("Save error:", e);
            }
        }

        let activeBrandId = null;
        let activeGeoIndex = null;

            try {
                initDatabase();
                renderBrands();

                document.addEventListener('contextmenu', function(e) {
                    if (e.target.closest('.brand-logo-img') || e.target.closest('.brand-logo-container')) {
                        e.preventDefault();
                    }
                });
            } catch (err) {
                console.error("Init Error:", err);
                // Запасной фоллбек на чистые данные если что-то сбойнуло
                brands = JSON.parse(JSON.stringify(defaultBrandsData));
                renderBrands();
            }
        }

        function setActiveTab(tab) {
            activeTab = tab;
            
            const tabButtons = ['all', 'core', 'test', 'trash'];
            tabButtons.forEach(t => {

                    } else {
                        btn.className = "px-4 py-2 text-xs font-bold rounded-xl transition-all text-gray-400 hover:text-white hover:bg-brandDark/40";
                    }
                }
            });

            document.getElementById('active-tab-title').textContent = `${tab} brands`;
            renderBrands(document.getElementById('search-input').value);
        }

        function renderBrands(filterText = '') {
            const grid = document.getElementById('brands-grid');
            if (!grid) return;
            grid.innerHTML = '';
            
            let filtered = brands;

            if (activeTab !== 'all') {
                filtered = filtered.filter(b => b.category === activeTab);

            if (filterText.trim()) {
                const query = filterText.toLowerCase();
                filtered = filtered.filter(b => {
                    const matchName = b.name.toLowerCase().includes(query);
                    const matchGeo = b.geos.some(g => g.name.toLowerCase().includes(query) || g.code.toLowerCase().includes(query));
                    const matchKeys = b.geos.some(g => g.keys && g.keys.some(k => k.toLowerCase().includes(query)));
                    return matchName || matchGeo || matchKeys;
                });
            }

            document.getElementById('results-count').textContent = `Найдено брендов: ${filtered.length}`;

            filtered.forEach(brand => {
                const compiledKeysString = brand.geos.map(g => {

                    return `${prefix}: ${kArr.join(', ')}`;
                }).join(' | ');

                const cardHtml = `
                    <div class="tilt-card bg-brandCard border border-brandBorder/60 rounded-[32px] overflow-hidden shadow-2xl relative h-[550px] flex flex-col pt-[11%] px-[11%] pb-8 hover:border-yellow-500/30 transition-colors"

        function copyCompiledKeysToClipboard(brandId) {
            const brand = brands.find(b => b.id === brandId);
            if (!brand) return;
            
            const compiledKeysString = brand.geos.map(g => {
                const prefix = g.code.toLowerCase() === 'gb' ? 'global' : g.code.toLowerCase();
                const kArr = Array.isArray(g.keys) ? g.keys : [];
                return `${prefix}: ${kArr.join(', ')}`;
            }).join(' | ');

            const tempEl = document.createElement('textarea');
            tempEl.value = compiledKeysString;
            tempEl.style.position = 'fixed';
            tempEl.style.opacity = '0';
            document.body.appendChild(tempEl);
            tempEl.select();
            
            try {
                const success = document.execCommand('copy');
                if (success) {
                    showToast("Ключи скопированы!");
                } else {
                    showToast("Ошибка копирования");
                }
            } catch (err) {
                console.error("Copy err:", err);
            }
            
            document.body.removeChild(tempEl);
        }

        function setupTiltEffect() {
            const cards = document.querySelectorAll('.tilt-card');
            cards.forEach(card => {
                card.removeEventListener('mousemove', handleMouseMove);
                card.removeEventListener('mouseleave', handleMouseLeave);
                
                card.addEventListener('mousemove', handleMouseMove);
                card.addEventListener('mouseleave', handleMouseLeave);
            });
        }

        function handleMouseMove(e) {
            const card = e.currentTarget;
            const cardRect = card.getBoundingClientRect();
            
            const cardWidth = cardRect.width;
            const cardHeight = cardRect.height;
            
            const x = e.clientX - cardRect.left;
            const y = e.clientY - cardRect.top;
            
            const xRotation = -6 * ((y - cardHeight / 2) / (cardHeight / 2));
            const yRotation = 6 * ((x - cardWidth / 2) / (cardWidth / 2));
            
            card.style.transform = `perspective(1000px) scale3d(1.015, 1.015, 1.015) rotateX(${xRotation}deg) rotateY(${yRotation}deg)`;
            card.style.boxShadow = '0 20px 40px rgba(0, 0, 0, 0.6)';
        }

        function handleMouseLeave(e) {
            const card = e.currentTarget;
            card.style.transform = 'perspective(1000px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg)';
            card.style.boxShadow = 'none';
        }

            closeGeoEditModal();
            renderBrands(document.getElementById('search-input').value);
            showToast("GEO настройки сохранены!");
        }

        function addGeoToActiveBrand() {
            const brand = brands.find(b => b.id === activeBrandId);
            if (!brand) return;

            if (brand.geos.length >= 7) {
                showToast("Достигнут лимит: максимум 7 GEO!");
                return;
            }

            const selectGeo = document.getElementById('edit-new-geo-select');
            const code = selectGeo.value;
            if (!code) return;

            const config = PREDEFINED_COUNTRIES.find(c => c.code === code);
            if (!config) return;

            brand.geos.push({
                code: config.code,
                name: config.name,
                flag: config.flag,
                keys: []
            });

            saveDatabase();
            triggerGeoEditModal({ preventDefault: () => {} }, activeBrandId, activeGeoIndex);
            renderBrands(document.getElementById('search-input').value);
            showToast(`GEO ${config.code} успешно добавлен!`);
        }

        function deleteGeoFromActiveBrand(e, geoIdx) {
            e.stopPropagation();
            const brand = brands.find(b => b.id === activeBrandId);
            if (!brand) return;

            brand.geos.splice(geoIdx, 1);

            saveDatabase();
            activeGeoIndex = 0;
            triggerGeoEditModal({ preventDefault: () => {} }, activeBrandId, 0);
            renderBrands(document.getElementById('search-input').value);
            showToast("GEO удалён из карточки.");
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            
            if (!toast || !toastText) return;
            toastText.textContent = text;
            
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 2500);
        }
    </script>
</body>
</html>
